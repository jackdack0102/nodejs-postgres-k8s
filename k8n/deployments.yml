apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: node-api

  template:
    metadata:
      labels:
        app: node-api

    spec:
      containers:
      - name: node-api
        image: hoanghuynh555/node-api:v1

        ports:
        - containerPort: 3000